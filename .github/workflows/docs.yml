# Validates recipe content, builds the Zensical site, and deploys it to GitHub Pages.
#
# Pages uses an artifact-based deployment. Repository Settings -> Pages -> Source
# must be set to "GitHub Actions".

name: docs

on:
  push:
    branches: [main]
    paths:
      - "recipes/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - "spec/**"
      - "s/check-recipes"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "recipes/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - "spec/**"
      - "s/check-recipes"
      - ".github/workflows/docs.yml"
      - ".github/dependabot.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.1.0
        with:
          python-version: "3.x"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check recipe content policy
        run: s/check-recipes

      - name: Build Zensical site
        run: zensical build --clean

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  workflow-security:
    name: GitHub Actions security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: zizmor@1.27.0
          fallback: none
      - run: zizmor --strict-collection .
        env:
          GH_TOKEN: ${{ github.token }}
