{% extends "base.html" %}

{% block extrahead %}
  <link rel="manifest" href="{{ 'manifest.webmanifest' | url }}">
  <meta name="theme-color" content="#8a7d65">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Recipes">
  <link rel="apple-touch-icon" href="{{ 'assets/icons/apple-touch-icon.png' | url }}">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        var swUrl = new URL({{ ('sw.js' | url) | tojson }}, document.baseURI).href;
        var scope = swUrl.substring(0, swUrl.lastIndexOf('/') + 1);
        navigator.serviceWorker
          .register(swUrl, { scope: scope })
          .catch(function (err) { console.warn('SW registration failed:', err); });
      });
    }
  </script>
{% endblock %}
